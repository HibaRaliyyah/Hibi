<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hibi · Personal Assistant</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 68 41' xmlns='http://www.w3.org/2000/svg'><path fill='%23E33213' d='M0.45 20.81C0.45 9.76 9.41 0.81 20.45 0.81H46.7C57.75 0.81 66.7 9.76 66.7 20.81V40.81H20.45C9.41 40.81 0.45 31.86 0.45 20.81Z'/><path fill='%23C9E864' d='M46.7 8.31H20.45C13.55 8.31 7.95 13.91 7.95 20.81C7.95 27.71 13.55 33.31 20.45 33.31H46.7C53.61 33.31 59.2 27.71 59.2 20.81C59.2 13.91 53.61 8.31 46.7 8.31Z'/><circle cx='20.45' cy='20.81' r='6.25' fill='%230f0f13'/><circle cx='47.95' cy='20.81' r='6.25' fill='%230f0f13'/><circle cx='17.95' cy='18.31' r='2.5' fill='white'/><circle cx='45.45' cy='18.31' r='2.5' fill='white'/></svg>"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Text:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Google Sans Text', 'Google Sans', sans-serif;
    background: #1e1f20;
    color: #e3e3e3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    gap: 10px;
    z-index: 100;
    flex-shrink: 0;
  }
  .topbar-logo { width: 80px; height: 70px; }
  .topbar-text { display: flex; flex-direction: column; }
  .topbar-title { font-size: 30px; font-weight: 500; color: #e3e3e3; }
  .topbar-badge {
    font-size: 12px; color: #8ab4f8;
    background: rgba(138,180,248,0.12);
    border-radius: 99px; padding: 2px 8px; margin-top: 2px;
    width: fit-content;
  }

  /* ── Welcome ── */
  .welcome-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; padding: 20px;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #8ab4f8 0%, #c5a3f5 50%, #f28b82 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 20px;
    box-shadow: 0 4px 24px rgba(138,180,248,0.25);
  }
  .welcome-heading {
    font-size: 35px; font-weight: 500;
    background: linear-gradient(90deg, #8ab4f8, #c5a3f5, #f28b82);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px; text-align: center;
  }
  .welcome-sub {
    font-size: 17px; color: #9aa0a6;
    text-align: center; max-width: 420px; line-height: 1.6;
  }

  /* ── Messages ── */
  .messages-area {
    flex: 1; overflow-y: auto;
    padding: 24px 0 12px;
    display: flex; flex-direction: column; gap: 4px;
    max-width: 768px; margin: 0 auto; width: 100%;
  }
  .msg-row {
    display: flex; gap: 12px;
    padding: 8px 24px; border-radius: 12px;
    transition: background 0.15s;
  }
  .msg-row:hover { background: rgba(255,255,255,0.03); }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .avatar.user-av { background: linear-gradient(135deg, #8ab4f8, #c5a3f5); color: #1e1f20; }
  .avatar.ai-av {
    background: linear-gradient(135deg, #c5a3f5 0%, #f28b82 100%);
    color: #fff; font-size: 16px;
  }

  .bubble {
    max-width: 82%; font-size: 15px;
    line-height: 1.65; color: #e3e3e3; padding: 4px 0;
  }
  .bubble.user-bubble {
    background: #2d2f31; padding: 12px 16px;
    border-radius: 20px 20px 4px 20px; color: #e3e3e3;
  }
  .bubble strong { color: #fff; font-weight: 600; }

  /* ── Thinking ── */
  .thinking-bubble { display: flex; align-items: center; gap: 4px; font-style: italic; font-size: 15px; }
  .thinking-dots span {
    display: inline-block;
    animation: blink 1.4s infinite both;
    font-size: 20px; color: #8ab4f8;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.15; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-3px); }
  }

  /* ── Input ── */
  .input-area {
    flex-shrink: 0;
    padding: 16px 0 28px;
    background: #1e1f20;
  }
  .input-wrap {
    max-width: 768px; margin: 0 auto; padding: 0 24px;
    display: flex; gap: 8px; align-items: center;
  }
  .input-wrap textarea {
    flex: 1; background: #2d2f31; border: 1px solid #2d2f31;
    border-radius: 28px; padding: 14px 20px;
    color: #e3e3e3; font-family: 'Google Sans Text', sans-serif;
    font-size: 15px; resize: none; outline: none;
    caret-color: #8ab4f8; line-height: 1.4; max-height: 120px;
    overflow-y: auto;
  }
  .input-wrap textarea::placeholder { color: #9aa0a6; }
  .input-wrap textarea:focus { border-color: #2d2f31; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #8ab4f8; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  .send-btn:hover { background: #aecbfa; }
  .send-btn svg { width: 18px; height: 18px; fill: #1e1f20; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #5f6368; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <svg viewBox="0 0 68 41" xmlns="http://www.w3.org/2000/svg" class="topbar-logo">
    <path fill="#E33213" d="M0.452637 20.81C0.452637 9.76427 9.40694 0.809967 20.4526 0.809967H46.7026C57.7484 0.809967 66.7026 9.76427 66.7026 20.81V40.81H20.4526C9.40694 40.81 0.452637 31.8557 0.452637 20.81Z"/>
    <path fill="#C9E864" d="M46.7026 8.30997H20.4526C13.5491 8.30997 7.95264 13.9064 7.95264 20.81C7.95264 27.7135 13.5491 33.31 20.4526 33.31H46.7026C53.6062 33.31 59.2026 27.7135 59.2026 20.81C59.2026 13.9064 53.6062 8.30997 46.7026 8.30997Z"/>
    <path fill="#0f0f13" d="M20.4526 27.06C23.9044 27.06 26.7026 24.2617 26.7026 20.81C26.7026 17.3582 23.9044 14.56 20.4526 14.56C17.0009 14.56 14.2026 17.3582 14.2026 20.81C14.2026 24.2617 17.0009 27.06 20.4526 27.06Z"/>
    <path fill="white" d="M17.9526 19.56C18.643 19.56 19.2026 19.0003 19.2026 18.31C19.2026 17.6196 18.643 17.06 17.9526 17.06C17.2623 17.06 16.7026 17.6196 16.7026 18.31C16.7026 19.0003 17.2623 19.56 17.9526 19.56Z"/>
    <path fill="#0f0f13" d="M47.9526 27.06C51.4044 27.06 54.2026 24.2617 54.2026 20.81C54.2026 17.3582 51.4044 14.56 47.9526 14.56C44.5009 14.56 41.7026 17.3582 41.7026 20.81C41.7026 24.2617 44.5009 27.06 47.9526 27.06Z"/>
    <path fill="white" d="M45.4526 19.56C46.143 19.56 46.7026 19.0003 46.7026 18.31C46.7026 17.6196 46.143 17.06 45.4526 17.06C44.7623 17.06 44.2026 17.6196 44.2026 18.31C44.2026 19.0003 44.7623 19.56 45.4526 19.56Z"/>
  </svg>
  <div class="topbar-text">
    <span class="topbar-title">Hibi</span>
    <span class="topbar-badge">Personal Assistant</span>
  </div>
</div>

<!-- Messages -->
<div class="messages-area" id="messagesArea">
  <div class="welcome-wrap" id="welcomeScreen">
    <div class="welcome-icon">✦</div>
    <div class="welcome-heading">Hello, I'm Hibi</div>
    <div class="welcome-sub">Hiba's personal AI assistant. Ask me anything about Hiba — her projects, skills, experience, and more.</div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Ask Hibi anything about Hiba…"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesArea = document.getElementById('messagesArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcomeScreen = document.getElementById('welcomeScreen');
  let history = [];
  let isThinking = false;

  function appendMessage(role, content) {
    if (welcomeScreen) welcomeScreen.remove();

    const row = document.createElement('div');
    row.className = `msg-row${role === 'user' ? ' user' : ''}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user-av' : 'ai-av'}`;
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const bubble = document.createElement('div');
    bubble.className = `bubble${role === 'user' ? ' user-bubble' : ''}`;
    bubble.innerHTML = content;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesArea.appendChild(row);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    return row;
  }

  function showThinking() {
    return appendMessage('ai', `
      <span class="thinking-bubble">
        <span style="color:#9aa0a6;font-style:italic;">Thinking</span>
        <span class="thinking-dots">
          <span>.</span><span>.</span><span>.</span>
        </span>
      </span>
    `);
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isThinking) return;

    isThinking = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    const thinkingRow = showThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });
      const data = await res.json();
      thinkingRow.remove();
      appendMessage('ai', data.reply);
      history.push({ role: 'assistant', content: data.reply });
    } catch (e) {
      thinkingRow.remove();
      appendMessage('ai', 'Sorry, something went wrong. Please try again.');
    }

    isThinking = false;
  }

  sendBtn.addEventListener('click', sendMessage);

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
