<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"/>
<title>Hibi · Personal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 68 41' xmlns='http://www.w3.org/2000/svg'><path fill='%23E33213' d='M0.45 20.81C0.45 9.76 9.41 0.81 20.45 0.81H46.7C57.75 0.81 66.7 9.76 66.7 20.81V40.81H20.45C9.41 40.81 0.45 31.86 0.45 20.81Z'/><path fill='%23C9E864' d='M46.7 8.31H20.45C13.55 8.31 7.95 13.91 7.95 20.81C7.95 27.71 13.55 33.31 20.45 33.31H46.7C53.61 33.31 59.2 27.71 59.2 20.81C59.2 13.91 53.61 8.31 46.7 8.31Z'/><circle cx='20.45' cy='20.81' r='6.25' fill='%230f0f13'/><circle cx='47.95' cy='20.81' r='6.25' fill='%230f0f13'/><circle cx='17.95' cy='18.31' r='2.5' fill='white'/><circle cx='45.45' cy='18.31' r='2.5' fill='white'/></svg>"/>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── CSS Variables ── */
:root {
  --bg: #1e1f20;
  --surface: #2d2f31;
  --border: rgba(255,255,255,0.07);
  --text-primary: #e3e3e3;
  --text-muted: #9aa0a6;
  --accent: #8ab4f8;
  --accent-hover: #aecbfa;
  --accent-purple: #c5a3f5;
  --accent-red: #f28b82;

  /* Spacing scale */
  --gap-xs: 4px;
  --gap-sm: 8px;
  --gap-md: 16px;
  --gap-lg: 24px;

  /* Topbar height per breakpoint — overridden in media queries */
  --topbar-h: 60px;
}

/* ── Base ── */
html { height: 100%; height: 100dvh; }

body {
  font-family: 'Google Sans Text', 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* ════════════════════════════════
   TOPBAR
   ════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  margin-top: 15px;
  gap: var(--gap-sm);
  padding: 10px var(--gap-md);
  height: var(--topbar-h);
  flex-shrink: 0;
  background: var(--bg);
  z-index: 10;
  /* safe area for notched phones */
  padding-left: max(var(--gap-md), env(safe-area-inset-left));
  padding-right: max(var(--gap-md), env(safe-area-inset-right));
}

.topbar-logo {
  width: 44px;
  height: 38px;
  flex-shrink: 0;
}

.topbar-text { display: flex; flex-direction: column; line-height: 1.2; }

.topbar-title {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.2px;
}

.topbar-badge {
  font-size: 10px;
  color: var(--accent);
  background: rgba(138,180,248,0.12);
  border-radius: 99px;
  padding: 2px 7px;
  margin-top: 3px;
  width: fit-content;
  letter-spacing: 0.2px;
}

/* ════════════════════════════════
   MESSAGES AREA
   ════════════════════════════════ */
.messages-area {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: var(--gap-md) 0 var(--gap-sm);
}

/* Center column on wider screens */
.messages-inner {
  width: 100%;
  max-width: 768px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

/* ── Welcome screen ── */
.welcome-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: var(--gap-lg) var(--gap-md);
  text-align: center;
}

.welcome-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 50%, var(--accent-red) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 18px;
  box-shadow: 0 4px 20px rgba(138,180,248,0.2);
  flex-shrink: 0;
}

.welcome-heading {
  font-size: clamp(24px, 7vw, 36px);
  font-weight: 500;
  background: linear-gradient(90deg, var(--accent), var(--accent-purple), var(--accent-red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  line-height: 1.2;
}

.welcome-sub {
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--text-muted);
  max-width: 320px;
  line-height: 1.65;
}

/* ── Avatars ── */
.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  margin-top: 2px;
}

.avatar.user-av {
  background: linear-gradient(135deg, var(--accent), var(--accent-purple));
  color: var(--bg);
}

.avatar.ai-av {
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-red));
  color: #fff;
  font-size: 14px;
}

/* ── Bubbles ── */
.bubble {
  font-size: clamp(13px, 3.5vw, 15px);
  line-height: 1.65;
  color: var(--text-primary);
  padding: 3px 0;
  max-width: calc(100% - 44px);
  word-break: break-word;
  overflow-wrap: anywhere;
}

.bubble.user-bubble {
  background: var(--surface);
  padding: 10px 14px;
  border-radius: 18px 18px 4px 18px;
  max-width: min(78%, 480px);
}

.bubble strong { color: #fff; font-weight: 500; }

.bubble a {
  color: var(--accent);
  text-decoration: none;
}
.bubble a:hover { text-decoration: underline; }

/* ── Thinking animation ── */
.thinking-bubble {
  display: flex;
  align-items: center;
  gap: var(--gap-xs);
  font-style: italic;
  font-size: 14px;
  color: var(--text-muted);
}

.thinking-dots span {
  display: inline-block;
  animation: blink 1.4s infinite both;
  font-size: 18px;
  color: var(--accent);
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.15; transform: translateY(0); }
  40%            { opacity: 1;    transform: translateY(-3px); }
}

/* ════════════════════════════════
   INPUT AREA
   ════════════════════════════════ */
.input-area {
  flex-shrink: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 10px var(--gap-md);
  /* safe-area for iPhone home bar */
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  padding-left: max(var(--gap-md), env(safe-area-inset-left));
  padding-right: max(var(--gap-md), env(safe-area-inset-right));
}

.input-wrap {
  max-width: 768px;
  margin: 0 auto;
  display: flex;
  gap: var(--gap-sm);
  align-items: flex-end;
}

.input-wrap textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 22px;
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 15px;
  resize: none;
  outline: none;
  caret-color: var(--accent);
  line-height: 1.5;
  max-height: 96px;
  overflow-y: auto;
  -webkit-appearance: none;
  transition: border-color 0.18s;
  /* prevent iOS zoom on focus (font < 16px triggers zoom) */
  font-size: max(16px, 1rem);
}

.input-wrap textarea::placeholder { color: var(--text-muted); }
.input-wrap textarea:focus { border-color: rgba(138,180,248,0.35); }

.send-btn {
  width: 40px;
  height: 40px;
  min-width: 40px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.send-btn:hover  { background: var(--accent-hover); }
.send-btn:active { transform: scale(0.92); background: var(--accent-hover); }
.send-btn svg { width: 17px; height: 17px; fill: var(--bg); }

/* ── Scrollbar (desktop only) ── */
@media (pointer: fine) {
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #5f6368; }
}

/* ════════════════════════════════
   BREAKPOINTS
   ════════════════════════════════ */

/* ── Tablet (≥ 600px) ── */
@media (min-width: 600px) {
  :root { --topbar-h: 68px; }

  .topbar {
    padding: 12px var(--gap-lg);
    gap: 10px;
  }

  .topbar-logo { width: 56px; height: 48px; }
  .topbar-title { font-size: 24px; }
  .topbar-badge { font-size: 11px; }

  .messages-area { padding: 20px 0 12px; }

  .msg-row { padding: 7px var(--gap-lg); }

  .avatar { width: 30px; height: 30px; }

  .welcome-icon { width: 60px; height: 60px; font-size: 24px; }

  .input-area {
    padding: 12px var(--gap-lg);
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  }

  .input-wrap textarea {
    padding: 11px 16px;
    font-size: 15px;
  }
}

/* ── Desktop (≥ 900px) ── */
@media (min-width: 900px) {
  :root { --topbar-h: 74px; }

  .topbar {
    padding: 14px 28px;
    gap: 12px;
  }

  .topbar-logo { width: 72px; height: 62px; }
  .topbar-title { font-size: 28px; }
  .topbar-badge { font-size: 12px; padding: 2px 9px; }

  .messages-area { padding: 24px 0 14px; }
  .msg-row { padding: 8px 24px; }

  .avatar { width: 32px; height: 32px; font-size: 13px; }
  .avatar.ai-av { font-size: 15px; }

  .welcome-icon { width: 64px; height: 64px; font-size: 26px; margin-bottom: 20px; }
  .welcome-sub { max-width: 400px; }

  .input-area {
    padding: 14px 28px;
    padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px));
  }

  .input-wrap textarea {
    padding: 13px 18px;
    font-size: 15px;
    max-height: 120px;
  }

  .send-btn { width: 42px; height: 42px; min-width: 42px; }
  .send-btn svg { width: 18px; height: 18px; }
}

/* ── Large Desktop (≥ 1280px) ── */
@media (min-width: 1280px) {
  .topbar { padding: 16px 32px; }
  .topbar-logo { width: 80px; height: 70px; }
  .topbar-title { font-size: 30px; }
  .input-area { padding: 16px 32px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)); }
}

/* ── Landscape mobile (short viewport) ── */
@media (max-height: 500px) and (orientation: landscape) {
  :root { --topbar-h: 52px; }
  .topbar { padding: 8px var(--gap-md); }
  .topbar-logo { width: 36px; height: 30px; }
  .topbar-title { font-size: 18px; }
  .topbar-badge { display: none; }
  .welcome-icon { width: 40px; height: 40px; margin-bottom: 10px; }
  .welcome-heading { font-size: 22px; }
  .input-area { padding: 8px var(--gap-md); }
}
</style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <svg viewBox="0 0 68 41" xmlns="http://www.w3.org/2000/svg" class="topbar-logo">
    <path fill="#E33213" d="M0.452637 20.81C0.452637 9.76427 9.40694 0.809967 20.4526 0.809967H46.7026C57.7484 0.809967 66.7026 9.76427 66.7026 20.81V40.81H20.4526C9.40694 40.81 0.452637 31.8557 0.452637 20.81Z"/>
    <path fill="#C9E864" d="M46.7026 8.30997H20.4526C13.5491 8.30997 7.95264 13.9064 7.95264 20.81C7.95264 27.7135 13.5491 33.31 20.4526 33.31H46.7026C53.6062 33.31 59.2026 27.7135 59.2026 20.81C59.2026 13.9064 53.6062 8.30997 46.7026 8.30997Z"/>
    <path fill="#0f0f13" d="M20.4526 27.06C23.9044 27.06 26.7026 24.2617 26.7026 20.81C26.7026 17.3582 23.9044 14.56 20.4526 14.56C17.0009 14.56 14.2026 17.3582 14.2026 20.81C14.2026 24.2617 17.0009 27.06 20.4526 27.06Z"/>
    <path fill="white" d="M17.9526 19.56C18.643 19.56 19.2026 19.0003 19.2026 18.31C19.2026 17.6196 18.643 17.06 17.9526 17.06C17.2623 17.06 16.7026 17.6196 16.7026 18.31C16.7026 19.0003 17.2623 19.56 17.9526 19.56Z"/>
    <path fill="#0f0f13" d="M47.9526 27.06C51.4044 27.06 54.2026 24.2617 54.2026 20.81C54.2026 17.3582 51.4044 14.56 47.9526 14.56C44.5009 14.56 41.7026 17.3582 41.7026 20.81C41.7026 24.2617 44.5009 27.06 47.9526 27.06Z"/>
    <path fill="white" d="M45.4526 19.56C46.143 19.56 46.7026 19.0003 46.7026 18.31C46.7026 17.6196 46.143 17.06 45.4526 17.06C44.7623 17.06 44.2026 17.6196 44.2026 18.31C44.2026 19.0003 44.7623 19.56 45.4526 19.56Z"/>
  </svg>
  <div class="topbar-text">
    <span class="topbar-title">Hibi</span>
    <span class="topbar-badge">Personal Assistant</span>
  </div>
</div>

<!-- ── Messages ── -->
<div class="messages-area" id="messagesArea">
  <div class="messages-inner" id="messagesInner">
    <div class="welcome-wrap" id="welcomeScreen">
      <div class="welcome-icon">✦</div>
      <div class="welcome-heading">Hello, I'm Hibi</div>
      <div class="welcome-sub">Hiba's personal AI assistant. Ask me anything about Hiba — her projects, skills, experience, and more.</div>
    </div>
  </div>
</div>

<!-- ── Input ── -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Ask Hibi anything about Hiba…" aria-label="Message input"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>

  /* ── Append message ── */
  function appendMessage(role, content) {
    if (welcomeScreen) {
      welcomeScreen.remove();
      welcomeScreen = null;
    }

    const row = document.createElement('div');
    row.className = `msg-row${role === 'user' ? ' user' : ''}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'user' ? 'user-av' : 'ai-av'}`;
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const bubble = document.createElement('div');
    bubble.className = `bubble${role === 'user' ? ' user-bubble' : ''}`;
    bubble.innerHTML = content;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesInner.appendChild(row);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    return row;
  }

  function showThinking() {
    return appendMessage('ai', `<span class="thinking-bubble">Thinking<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span></span>`);
  }

  /* ── Send ── */
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isThinking) return;

    isThinking = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    const thinkingRow = showThinking();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });
      const data = await res.json();
      thinkingRow.remove();
      appendMessage('ai', data.reply);
      history.push({ role: 'assistant', content: data.reply });
    } catch {
      thinkingRow.remove();
      appendMessage('ai', 'Sorry, something went wrong. Please try again.');
    }

    isThinking = false;
  }

  /* ── Events ── */
  sendBtn.addEventListener('click', sendMessage);

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 96) + 'px';
  });

  /* Scroll to bottom when virtual keyboard resizes viewport */
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  }
</script>
</body>
</html>
